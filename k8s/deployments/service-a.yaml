apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: backend
  labels:
    app: service-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      initContainers:
        # Init container fetches Vault Secret ID using Response Wrapping
        - name: vault-init
          image: vault:latest
          command:
            - sh
            - -c
            - |
              vault unwrap -address=http://<VAULT_ADDRESS>:8200 $VAULT_WRAP_TOKEN \
                | jq -r '.data.secret_id' > /vault/secret-id
          env:
            - name: VAULT_WRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-wrap-token
                  key: token
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault

      containers:
        - name: service-a
          image: <YOUR_REGISTRY>/service-a:latest
          ports:
            - containerPort: 8080
          env:
            - name: VAULT_ADDR
              value: "http://<VAULT_ADDRESS>:8200"
            - name: VAULT_ROLE_ID
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: role-id
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault
            - name: service-a-storage
              mountPath: /data

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        - name: vault-secrets
          emptyDir: {}
        - name: service-a-storage
          persistentVolumeClaim:
            claimName: service-a-pvc
